name: Ingestão Diária de Notícias (Web RSS)

on:
  schedule:
    # Corre todos os dias às 09:00 e às 18:00 (Hora UTC)
    - cron: "0 9,18 * * *"
  workflow_dispatch: # Permite-te disparar manualmente se quiseres testar agora

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar Motor de Aquisição de Notícias
        env:
          DB_SERVER: ${{ secrets.DB_SERVER }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASS: ${{ secrets.DB_PASS }}
        run: python gerar_dados_portugal.py
